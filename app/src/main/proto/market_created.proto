syntax = "proto3";

option java_package = "com.polytradings.betaction.protobuf";
option java_outer_classname = "MarketCreatedProto";

message MarketCreated {
    string source = 1;
    string market_id = 2;
    string condition_id = 3;
    string crypto_symbol = 4;
    int32 timeframe_minutes = 5;
    string up_token_id = 6;
    string down_token_id = 7;
    int64 start_unix_ms = 8;
    int64 end_unix_ms = 9;
    int64 discovered_at_unix_ms = 10;
    bool closed = 11;
}
