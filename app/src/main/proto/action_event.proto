syntax = "proto3";

option java_package = "com.polytradings.betaction.protobuf";
option java_outer_classname = "ActionEventProto";

message ActionEvent {
    enum ActionType {
        NO_ACTION = 0;
        WAIT = 1;
        BET_DOWN = 2;
        BET_UP = 3;
    }
    
    ActionType action = 1;
    string symbol = 2;
    int64 timestamp = 3;
    string reason = 4;
}
